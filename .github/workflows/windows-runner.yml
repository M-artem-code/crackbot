name: Windows Runner Beta

on:
  workflow_dispatch:
  push:
    tags:
      - 'runner-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent/requirements.txt
      - name: Install pinned build dependencies
        run: python -m pip install --requirement agent/requirements.txt pyinstaller==6.14.2
      - name: Unit tests
        working-directory: agent
        run: python -m unittest test_windows_runner.py
      - name: Build tray application
        working-directory: agent
        run: pyinstaller --clean --noconfirm BotForgeRunner.spec
      - name: Verify Inno Setup
        shell: pwsh
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) { throw 'Inno Setup 6 is not installed on the runner image' }
          & $iscc /?
      - name: Build per-user setup
        shell: pwsh
        env:
          BOTFORGE_SERVER_URL: ${{ vars.BOTFORGE_SERVER_URL }}
        run: |
          if (-not $env:BOTFORGE_SERVER_URL) { $env:BOTFORGE_SERVER_URL = 'https://crackbot-phi.vercel.app' }
          if (-not [Uri]::IsWellFormedUriString($env:BOTFORGE_SERVER_URL, [UriKind]::Absolute)) { throw 'BOTFORGE_SERVER_URL must be an absolute HTTPS URL' }
          if (-not $env:BOTFORGE_SERVER_URL.StartsWith('https://')) { throw 'BOTFORGE_SERVER_URL must use HTTPS' }
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' "/DAppServerUrl=$env:BOTFORGE_SERVER_URL" installer\BotForgeRunner.iss
      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash installer\output\BotForgeRunner-Setup.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  BotForgeRunner-Setup.exe" | Set-Content -NoNewline installer\output\BotForgeRunner-Setup.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: BotForgeRunner-Windows-unsigned-beta
          path: |
            installer/output/BotForgeRunner-Setup.exe
            installer/output/BotForgeRunner-Setup.exe.sha256
          if-no-files-found: error
          retention-days: 30
      - name: Publish tagged beta
        if: startsWith(github.ref, 'refs/tags/runner-v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            installer/output/BotForgeRunner-Setup.exe
            installer/output/BotForgeRunner-Setup.exe.sha256
